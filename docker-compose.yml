services:

  db:
    image: postgres:latest
    container_name: ReMind_database
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql
  redis:
    image: redis:latest
    container_name: ReMind_redis
    volumes:
      - redis_data:/data

  web:
    build:
      context: .
      dockerfile: backend.Dockerfile
    env_file: .env
    container_name: ReMind_backend

    volumes:
      - .:/app
      - ReMind_media:/app/media
      - ReMind_static:/app/static
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      - db
      - redis




volumes:
  postgres_data:
  redis_data:
  ReMind_media:
  ReMind_static: